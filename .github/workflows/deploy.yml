name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Lint
        run: ruff check app

      - name: Type check
        run: mypy app || true   # warn-only until full type coverage lands

      - name: Tests
        run: pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://axiom:axiom@127.0.0.1:5432/axiom
          REDIS_URL: redis://127.0.0.1:6379/0
          JWT_SECRET: ci-jwt-secret-32-bytes-please-min
          AES_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

  deploy:
    needs: ci
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: production
    steps:
      - name: SSH deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/axiom/app
            BRANCH=main bash scripts/deploy.sh
